<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wheel of Math 🎡 Premium Educational Game</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-glow: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-display: 'Poppins', sans-serif;
            --font-body: 'Nunito', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: var(--font-body);
            background: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 10px;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            text-align: center;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .gradient-text {
            background: linear-gradient(45deg, #38bdf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 1rem;
            font-family: var(--font-body);
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2);
        }

        .grid-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .selector-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 8px;
            color: var(--text-muted);
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            text-align: center;
        }

        .selector-btn.active {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-color: #60a5fa;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(6, 182, 212, 0.4);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 16px;
            padding: 12px;
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
        }

        .hud-val {
            font-size: 1.1rem;
            font-weight: 800;
            font-family: var(--font-display);
        }

        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 0 8px rgba(255,255,255,0.05);
        }

        .wheel-pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ef4444;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            z-index: 10;
        }

        .wheel-center-pin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #fff 0%, #cbd5e1 60%, #475569 100%);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 5;
        }

        .question-box {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 800;
            font-family: var(--font-display);
            margin: 15px 0;
            min-height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        #fx-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        .list-container {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .utility-row {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .util-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake {
            animation: shakeAnim 0.4s ease-in-out;
        }

        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="fx-canvas"></canvas>

        <div id="screen-auth" class="screen active">
            <h1 class="gradient-text">🎡 Wheel of Math</h1>
            <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-top: -10px;">KSSR Matematik Premium Edition</p>
            
            <div class="input-group">
                <label for="player-name">Nama Wira Matematik:</label>
                <input type="text" id="player-name" placeholder="Masukkan nama anda..." autocomplete="off">
            </div>

            <div class="input-group">
                <label>Tahap Kesukaran:</label>
                <div class="grid-selector" id="difficulty-selector">
                    <div class="selector-btn active" data-val="easy">🟢 Mudah</div>
                    <div class="selector-btn" data-val="medium">🟡 Sederhana</div>
                    <div class="selector-btn" data-val="hard">🔴 Sukar</div>
                </div>
            </div>

            <button id="btn-start-game" class="btn-primary" style="margin-top: 10px;">MULA PERMAINAN 🚀</button>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="showScreen('screen-leaderboard')" class="btn-secondary">🏆 Kedudukan</button>
                <button onclick="showScreen('screen-stats')" class="btn-secondary">📊 Statistik</button>
            </div>
        </div>

        <div id="screen-wheel" class="screen">
            <div class="hud">
                <div class="hud-item">
                    <span class="hud-label">Pemain</span>
                    <span class="hud-val" id="hud-name">-</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Skor</span>
                    <span class="hud-val" style="color: #eab308;" id="hud-score">0</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Nyawa</span>
                    <span class="hud-val" id="hud-lives" style="color: #ef4444;">❤️❤️❤️</span>
                </div>
            </div>

            <div class="wheel-wrapper">
                <div class="wheel-pointer"></div>
                <div class="wheel-center-pin"></div>
                <canvas id="wheel-canvas" width="600" height="600"></canvas>
            </div>

            <button id="btn-spin" class="btn-primary" style="background: linear-gradient(135deg, #f59e0b, #ef4444); box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4);">PUTAR RODA 🎡</button>
            
            <div class="utility-row">
                <button class="util-btn" id="btn-mute">🔊 Kesan Bunyi</button>
                <button class="util-btn" onclick="exitToMenu()">🏠 Menu</button>
            </div>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="hud">
                <div id="quiz-cat-badge" style="padding: 4px 12px; border-radius: 12px; font-weight:700; font-size:0.85rem; color: white;">KAT</div>
                <div class="hud-item">
                    <span class="hud-label">Streak</span>
                    <span class="hud-val" style="color:#22c55e" id="quiz-streak">x1</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Masa Sisa</span>
                    <span class="hud-val" id="quiz-timer">--s</span>
                </div>
            </div>

            <div class="card" style="margin-top: 10px;">
                <div class="question-box" id="quiz-question">Mendapatkan soalan...</div>
            </div>

            <div class="options-grid" id="quiz-options-container"></div>
        </div>

        <div id="screen-leaderboard" class="screen">
            <h2>🏆 Papan Kedudukan</h2>
            <div class="card">
                <div class="list-container" id="leaderboard-list">
                    <div style="text-align:center; color:var(--text-muted);">Memuatkan data...</div>
                </div>
            </div>
            <button onclick="showScreen('screen-auth')" class="btn-primary">Kembali ke Menu</button>
        </div>

        <div id="screen-stats" class="screen">
            <h2>📊 Statistik Profil</h2>
            <div class="card" style="display:flex; flex-direction:column; gap:10px;">
                <div class="list-item"><span>Jumlah Spin:</span><b id="st-spin">0</b></div>
                <div class="list-item"><span>Dijawab Betul:</span><b id="st-correct" style="color:#22c55e">0</b></div>
                <div class="list-item"><span>Dijawab Salah:</span><b id="st-wrong" style="color:#ef4444">0</b></div>
                <div class="list-item"><span>Ketepatan (%):</span><b id="st-accuracy">0%</b></div>
            </div>
            <button onclick="showScreen('screen-auth')" class="btn-primary">Kembali ke Menu</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcse0E4FxrSm0idMScbTty_kVUwBcWUgo",
            authDomain: "logicmaththinking.firebaseapp.com",
            databaseURL: "https://logicmaththinking-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "logicmaththinking",
            storageBucket: "logicmaththinking.firebasestorage.app",
            messagingSenderId: "330047683583",
            appId: "1:330047683583:web:4f7e3f3b943f8d49ca45ca"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        signInAnonymously(auth).then((user) => {
            currentUser = user.user;
            loadLocalStats();
        }).catch(err => console.error("Firebase Auth Error:", err));

        const categories = [
            { name: "Tambah ➕", color: "#3b82f6", key: "tambah" },
            { name: "Tolak ➖", color: "#ef4444", key: "tolak" },
            { name: "Darab ✖", color: "#10b981", key: "darab" },
            { name: "Bahagi ➗", color: "#f59e0b", key: "bahagi" },
            { name: "Geometri 🔺", color: "#8b5cf6", key: "geometri" },
            { name: "Ukuran 📏", color: "#ec4899", key: "ukuran" },
            { name: "Nombor 🧮", color: "#14b8a6", key: "nombor" },
            { name: "Data 📊", color: "#6366f1", key: "data" },
            { name: "Masa 🕒", color: "#f43f5e", key: "masa" },
            { name: "Wang 💰", color: "#22c55e", key: "wang" },
            { name: "Bonus 🎯", color: "#eab308", key: "bonus" }
        ];

        let gameState = {
            playerName: "Wira",
            difficulty: "easy",
            score: 0,
            streak: 1,
            lives: 3,
            currentCategory: null,
            currentQuestion: null,
            isMuted: false,
            stats: { spin: 0, correct: 0, wrong: 0 },
            questionHistory: new Set() // Memori anti-pengulangan soalan sebati
        };

        let shuffleBag = [];
        function rebuildShuffleBag() {
            shuffleBag = categories.map(c => c.key);
            for (let i = shuffleBag.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffleBag[i], shuffleBag[j]] = [shuffleBag[j], shuffleBag[i]];
            }
        }

        // AUDIO GENERATOR USING WEB AUDIO API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (gameState.isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'spin') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(180, now);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
                osc.start(now); osc.stop(now + 0.04);
            } else if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
                gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'victory') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(783.99, now + 0.15);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        }

        // HIGH-VARIETY PROCEDURAL GENERATION (KSSR MATH SYLLABUS TAHUN 1 - 6)
        function generateProceduralQuestion(category, difficulty) {
            let qText = "", ans = 0, opts = [];
            let attempts = 0;

            // Loop untuk mengelakkan pengulangan soalan berasaskan teks soalan yang pernah keluar
            do {
                opts = [];
                let variant = Math.floor(Math.random() * 3); // 3 Jenis sub-formula bagi setiap subjek

                switch(category) {
                    case 'tambah':
                        if (difficulty === 'easy') {
                            let a = Math.floor(Math.random() * 20) + 2;
                            let b = Math.floor(Math.random() * 10) + 1;
                            qText = `${a} + ${b} = ?`; ans = a + b;
                        } else if (difficulty === 'medium') {
                            let a = Math.floor(Math.random() * 80) + 15;
                            let b = Math.floor(Math.random() * 50) + 10;
                            qText = (variant === 0) ? `Kira hasil tambah ${a} dan ${b}:` : `${a} + ${b} = ?`;
                            ans = a + b;
                        } else {
                            let a = Math.floor(Math.random() * 600) + 150;
                            let b = Math.floor(Math.random() * 400) + 90;
                            qText = (variant === 0) ? `Cari anu: ${a} + ${b} = [ ]` : `Kira mengumpul semula: ${a} + ${b}`;
                            ans = a + b;
                        }
                        break;

                    case 'tolak':
                        if (difficulty === 'easy') {
                            let a = Math.floor(Math.random() * 20) + 10;
                            let b = Math.floor(Math.random() * a);
                            qText = `${a} - ${b} = ?`; ans = a - b;
                        } else if (difficulty === 'medium') {
                            let a = Math.floor(Math.random() * 90) + 20;
                            let b = Math.floor(Math.random() * (a - 10)) + 5;
                            qText = (variant === 0) ? `Berapakah beza antara ${a} dan ${b}?` : `${a} - ${b} = ?`;
                            ans = a - b;
                        } else {
                            let a = Math.floor(Math.random() * 900) + 100;
                            let b = Math.floor(Math.random() * (a - 50)) + 20;
                            qText = `Kira pinjam mengumpul semula: ${a} - ${b}`; ans = a - b;
                        }
                        break;

                    case 'darab':
                        let maxD = difficulty === 'easy' ? 5 : (difficulty === 'medium' ? 9 : 12);
                        let d1 = Math.floor(Math.random() * maxD) + 2;
                        let d2 = Math.floor(Math.random() * (difficulty === 'hard' ? 50 : 10)) + 2;
                        qText = (variant === 0) ? `Darabkan ${d1} dengan ${d2}:` : `${d1} × ${d2} = ?`;
                        ans = d1 * d2;
                        break;

                    case 'bahagi':
                        let bDiv = Math.floor(Math.random() * (difficulty === 'easy' ? 5 : 9)) + 2;
                        let bAns = Math.floor(Math.random() * (difficulty === 'easy' ? 6 : (difficulty === 'medium' ? 10 : 25))) + 1;
                        let bProd = bDiv * bAns;
                        if (difficulty === 'hard' && variant === 1) {
                            // Bahagi berbaki
                            let rem = Math.floor(Math.random() * (bDiv - 1)) + 1;
                            qText = `Berapakah baki bagi ${bProd + rem} ÷ ${bDiv}?`;
                            ans = rem;
                        } else {
                            qText = `${bProd} ÷ ${bDiv} = ?`;
                            ans = bAns;
                        }
                        break;

                    case 'geometri':
                        if (variant === 0) {
                            let shapes = ["Segitiga", "Segi Empat Sama", "Pentagon", "Heksagon"];
                            let sName = shapes[Math.floor(Math.random() * (difficulty === 'easy' ? 2 : 4))];
                            qText = `Berapakah bilangan bucu bagi sebuah ${sName}?`;
                            ans = sName === "Segitiga" ? 3 : (sName === "Segi Empat Sama" ? 4 : (sName === "Pentagon" ? 5 : 6));
                        } else {
                            let sisi = Math.floor(Math.random() * 5) + 3;
                            qText = `Sebuah segi empat tepat mempunyai panjang ${sisi}cm dan lebar 2cm. Berapakah luasnya (cm²)?`;
                            ans = sisi * 2;
                        }
                        break;

                    case 'ukuran':
                        let unitVal = Math.floor(Math.random() * 8) + 2;
                        if (variant === 0) {
                            qText = `Tukarkan ${unitVal} Meter (m) kepada Sentimeter (cm):`;
                            ans = unitVal * 100;
                        } else if (variant === 1) {
                            qText = `Tukarkan ${unitVal} Kilometer (km) kepada Meter (m):`;
                            ans = unitVal * 1000;
                        } else {
                            qText = `Tukarkan ${unitVal} Liter (l) kepada Mililiter (ml):`;
                            ans = unitVal * 1000;
                        }
                        break;

                    case 'nombor':
                        let numRand = Math.floor(Math.random() * (difficulty === 'easy' ? 30 : 500)) + 5;
                        if (variant === 0) {
                            qText = `Adakah nombor ${numRand * 2 + 1} Ganjil atau Genap?`;
                            return { question: qText, answer: "Ganjil", options: ["Ganjil", "Genap"] };
                        } else {
                            let placeVal = numRand.toString();
                            qText = `Apakah nilai tempat bagi digit '${placeVal[0]}' dalam ${placeVal}?`;
                            let len = placeVal.length;
                            let pAns = len === 3 ? "Ratus" : (len === 2 ? "Puluh" : "Sa");
                            return { question: qText, answer: pAns, options: ["Sa", "Puluh", "Ratus"].sort(() => Math.random() - 0.5) };
                        }

                    case 'data':
                        let repr = Math.floor(Math.random() * 5) + 2;
                        let count = Math.floor(Math.random() * 4) + 2;
                        qText = `Jika 1 piktograf 🌟 mewakili ${repr} buah buku, berapakah jumlah bagi ${count} 🌟?`;
                        ans = repr * count;
                        break;

                    case 'masa':
                        let tVal = Math.floor(Math.random() * 5) + 1;
                        if (variant === 0) {
                            qText = `Berapakah minit bagi ${tVal} jam?`; ans = tVal * 60;
                        } else {
                            qText = `Berapakah hari bagi ${tVal} minggu?`; ans = tVal * 7;
                        }
                        break;

                    case 'wang':
                        let w1 = Math.floor(Math.random() * (difficulty === 'easy' ? 10 : 50)) + 1;
                        let w2 = Math.floor(Math.random() * (difficulty === 'easy' ? 10 : 40)) + 1;
                        if (variant === 0) {
                            qText = `RM ${w1} + RM ${w2} = ?`; ans = w1 + w2;
                        } else {
                            let sen = Math.floor(Math.random() * 3) * 10 + 20;
                            qText = `RM ${w1} dan ${sen} sen ditukarkan sepenuhnya kepada sen menjadi:`;
                            ans = (w1 * 100) + sen;
                        }
                        break;

                    case 'bonus':
                    default:
                        let bVal = Math.floor(Math.random() * 12) + 2;
                        qText = `SOALAN BONUS: Gandaan 10 bagi ${bVal} ialah:`;
                        ans = bVal * 10;
                        break;
                }
                attempts++;
            } while (gameState.questionHistory.has(qText) && attempts < 20);

            // Daftar teks soalan ke memori untuk mengelakkan pengulangan masa hadapan
            gameState.questionHistory.add(qText);
            if (gameState.questionHistory.size > 50) {
                // Buang item paling lama jika memori melebihi 50 soalan
                const firstItem = gameState.questionHistory.values().next().value;
                gameState.questionHistory.delete(firstItem);
            }

            // Membina Pilihan Jawapan Rawak
            if (opts.length === 0) {
                opts.push(ans);
                while(opts.length < 4) {
                    let dev = (Math.floor(Math.random() * 6) + 1) * (Math.random() < 0.5 ? 1 : -1);
                    let wrong = ans + dev;
                    if(wrong >= 0 && !opts.includes(wrong)) opts.push(wrong);
                }
                opts.sort(() => Math.random() - 0.5);
            }
            return { question: qText, answer: ans.toString(), options: opts.map(o => o.toString()) };
        }

        window.showScreen = function(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(screenId === 'screen-leaderboard') fetchLeaderboard();
        };

        // UI Selector Setup
        const diffEl = document.getElementById('difficulty-selector');
        diffEl.addEventListener('click', (e) => {
            if(e.target.classList.contains('selector-btn')) {
                diffEl.querySelectorAll('.selector-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                gameState.difficulty = e.target.getAttribute('data-val');
                playSound('click');
            }
        });

        document.getElementById('btn-start-game').addEventListener('click', () => {
            let inp = document.getElementById('player-name').value.trim();
            gameState.playerName = inp || "Wira Matematik";
            gameState.score = 0;
            gameState.streak = 1;
            gameState.lives = 3;
            gameState.questionHistory.clear();
            
            document.getElementById('hud-name').innerText = gameState.playerName;
            document.getElementById('hud-score').innerText = gameState.score;
            document.getElementById('hud-lives').innerText = "❤️ ".repeat(gameState.lives);
            
            rebuildShuffleBag();
            drawWheel(0);
            showScreen('screen-wheel');
            playSound('victory');
        });

        // CANVAS WORK & ALIGNED ROTATION FIZIK (Bukan Rawak - Berhenti Tepat pada Kategori Soalan)
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        let currentAngle = 0;
        let isSpinning = false;

        function drawWheel(angle) {
            const numSegments = categories.length;
            const arcSize = (2 * Math.PI) / numSegments;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(angle);

            for (let i = 0; i < numSegments; i++) {
                ctx.beginPath();
                ctx.fillStyle = categories[i].color;
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, 280, i * arcSize, (i + 1) * arcSize);
                ctx.lineTo(0, 0);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = "white";
                ctx.font = "bold 16px 'Poppins', sans-serif";
                ctx.textAlign = "right";
                ctx.rotate((i + 0.5) * arcSize);
                ctx.fillText(categories[i].name, 250, 6);
                ctx.restore();
            }
            ctx.restore();
        }

        document.getElementById('btn-spin').addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            gameState.stats.spin++;
            
            if (shuffleBag.length === 0) rebuildShuffleBag();
            let chosenKey = shuffleBag.pop();
            let targetIdx = categories.findIndex(c => c.key === chosenKey);

            const numSegments = categories.length;
            const arcSize = (2 * Math.PI) / numSegments;
            
            // Jajaran Sudut Putaran ke Penunjuk Atas (12 o'clock)
            let targetAngle = (1.5 * Math.PI) - ((targetIdx + 0.5) * arcSize);
            if (targetAngle < 0) targetAngle += 2 * Math.PI;

            let extraSpins = (Math.floor(Math.random() * 3) + 4) * 2 * Math.PI; 
            let finalRotation = extraSpins + targetAngle;

            let startTimestamp = null;
            const duration = 4000;
            let lastSoundTick = 0;

            function animateWheel(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                let elapsed = timestamp - startTimestamp;
                let progress = Math.min(elapsed / duration, 1);
                
                let easeOutCubic = 1 - Math.pow(1 - progress, 3);
                currentAngle = finalRotation * easeOutCubic;
                
                drawWheel(currentAngle);

                if (Math.floor(currentAngle * 10) > lastSoundTick) {
                    playSound('spin');
                    lastSoundTick = Math.floor(currentAngle * 10);
                }

                if (progress < 1) {
                    requestAnimationFrame(animateWheel);
                } else {
                    isSpinning = false;
                    gameState.currentCategory = categories[targetIdx];
                    setTimeout(() => triggerQuiz(gameState.currentCategory), 600);
                }
            }
            requestAnimationFrame(animateWheel);
        });

        // SYSTEM KUIZ INTERAKTIF
        let quizInterval = null;
        let quizTimeSisa = 15;

        function triggerQuiz(category) {
            playSound('victory');
            const qBox = document.getElementById('quiz-cat-badge');
            qBox.innerText = category.name;
            qBox.style.backgroundColor = category.color;

            gameState.currentQuestion = generateProceduralQuestion(category.key, gameState.difficulty);
            document.getElementById('quiz-question').innerText = gameState.currentQuestion.question;
            document.getElementById('quiz-streak').innerText = `x${gameState.streak}`;

            const container = document.getElementById('quiz-options-container');
            container.innerHTML = "";
            gameState.currentQuestion.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkPlayerAnswer(opt, btn);
                container.appendChild(btn);
            });

            quizTimeSisa = 15;
            document.getElementById('quiz-timer').innerText = `${quizTimeSisa}s`;
            clearInterval(quizInterval);
            quizInterval = setInterval(() => {
                quizTimeSisa--;
                document.getElementById('quiz-timer').innerText = `${quizTimeSisa}s`;
                if(quizTimeSisa <= 0) {
                    clearInterval(quizInterval);
                    checkPlayerAnswer("", null);
                }
            }, 1000);

            showScreen('screen-quiz');
        }

        function checkPlayerAnswer(selected, btnElement) {
            clearInterval(quizInterval);
            const isCorrect = selected === gameState.currentQuestion.answer;

            if (isCorrect) {
                playSound('correct');
                if(btnElement) btnElement.style.background = "linear-gradient(135deg, #10b981, #047857)";
                gameState.stats.correct++;
                let pts = 10 * gameState.streak;
                if(quizTimeSisa > 10) pts += 5;
                gameState.score += pts;
                gameState.streak++;
                triggerFXCanvas();
            } else {
                playSound('wrong');
                if(btnElement) btnElement.style.background = "linear-gradient(135deg, #ef4444, #b91c1c)";
                document.getElementById('screen-quiz').classList.add('shake');
                setTimeout(() => document.getElementById('screen-quiz').classList.remove('shake'), 400);
                
                gameState.stats.wrong++;
                gameState.streak = 1;
                gameState.lives--;
            }

            document.getElementById('hud-score').innerText = gameState.score;
            document.getElementById('hud-lives').innerText = gameState.lives > 0 ? "❤️ ".repeat(gameState.lives) : "❌";

            setTimeout(() => {
                if (gameState.lives <= 0) {
                    saveFinalScoreToFirebase();
                    alert(`Permainan Tamat! Skor Akhir Anda: ${gameState.score}`);
                    exitToMenu();
                } else {
                    showScreen('screen-wheel');
                }
            }, 1200);
        }

        window.exitToMenu = function() {
            clearInterval(quizInterval);
            saveFinalScoreToFirebase();
            showScreen('screen-auth');
        };

        // PARTICLE OVERLAY (CONFETTI ANIMATION)
        const fxCanvas = document.getElementById('fx-canvas');
        const fxCtx = fxCanvas.getContext('2d');
        let particles = [];

        function resizeFxCanvas() {
            fxCanvas.width = document.getElementById('game-container').clientWidth;
            fxCanvas.height = document.getElementById('game-container').clientHeight;
        }
        window.addEventListener('resize', resizeFxCanvas);
        resizeFxCanvas();

        function triggerFXCanvas() {
            particles = [];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: fxCanvas.width / 2,
                    y: fxCanvas.height / 3,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 4,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    size: Math.random() * 6 + 4,
                    alpha: 1
                });
            }
            renderParticles();
        }

        function renderParticles() {
            if (particles.length === 0) return;
            fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
            particles.forEach((p, idx) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.alpha -= 0.02;
                
                fxCtx.save();
                fxCtx.globalAlpha = p.alpha;
                fxCtx.fillStyle = p.color;
                fxCtx.beginPath();
                fxCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                fxCtx.fill();
                fxCtx.restore();

                if(p.alpha <= 0) particles.splice(idx, 1);
            });
            if(particles.length > 0) requestAnimationFrame(renderParticles);
        }

        // LOCAL STORAGE & FIREBASE OPERATIONS
        function loadLocalStats() {
            let local = localStorage.getItem('wom_stats_v3');
            if (local) {
                gameState.stats = JSON.parse(local);
                syncStatsUI();
            }
        }

        function syncStatsUI() {
            document.getElementById('st-spin').innerText = gameState.stats.spin || 0;
            document.getElementById('st-correct').innerText = gameState.stats.correct || 0;
            document.getElementById('st-wrong').innerText = gameState.stats.wrong || 0;
            let total = (gameState.stats.correct || 0) + (gameState.stats.wrong || 0);
            let acc = total > 0 ? Math.round((gameState.stats.correct / total) * 100) : 0;
            document.getElementById('st-accuracy').innerText = `${acc}%`;
        }

        async function saveFinalScoreToFirebase() {
            localStorage.setItem('wom_stats_v3', JSON.stringify(gameState.stats));
            syncStatsUI();

            if (!currentUser) return;
            try {
                const userLeaderboardRef = doc(db, "leaderboard", currentUser.uid);
                await setDoc(userLeaderboardRef, {
                    name: gameState.playerName,
                    score: gameState.score,
                    difficulty: gameState.difficulty,
                    timestamp: Date.now()
                }, { merge: true });
            } catch(e) {
                console.error("Firebase Sync Error:", e);
            }
        }

        async function fetchLeaderboard() {
            const listContainer = document.getElementById('leaderboard-list');
            listContainer.innerHTML = "<div style='text-align:center; color:var(--text-muted);'>Memuat turun data papan skor...</div>";
            
            try {
                const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
                const querySnapshot = await getDocs(q);
                listContainer.innerHTML = "";
                
                let rank = 1;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = "list-item";
                    item.innerHTML = `<span><b>#${rank}</b> ${data.name || 'Wira'} <small style='color:var(--text-muted)'>(${data.difficulty})</small></span><b>${data.score} Pts</b>`;
                    listContainer.appendChild(item);
                    rank++;
                });

                if(rank === 1) {
                    listContainer.innerHTML = "<div style='text-align:center; color:var(--text-muted);'>Belum ada rekod.</div>";
                }
            } catch (err) {
                listContainer.innerHTML = "<div style='text-align:center; color:#ef4444;'>Gagal memuatkan rekod online.</div>";
            }
        }

        document.getElementById('btn-mute').addEventListener('click', () => {
            gameState.isMuted = !gameState.isMuted;
            document.getElementById('btn-mute').innerText = gameState.isMuted ? "🔇 Senyap" : "🔊 Kesan Bunyi";
        });

        drawWheel(0);
    </script>
</body>
</html>
